<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PIM Activator</title>
<style>
  :root { color-scheme: light; }
  html, body { margin:0; padding:0; width:720px; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:#ffffff; color:#1a1a1a; font-size:13px; overflow-x:hidden; }
  /* Pin header + activation footer + attribution footer at the top/bottom of
     the popup. ONLY the list area scrolls. This way the user always sees
     "Developed by Morten Knudsen ... Tenant: ..." without scrolling, and
     the Activate / Justification controls don't get buried either. */
  /* Popup sizes to content (compact on sign-in screen, expands when there's
     a group list to render). The lists themselves get an explicit max-height
     + overflow so they scroll INSIDE the popup -- footer stays visible. */
  #list, #myaccess-list { max-height:300px; overflow-y:auto; }
  /* Hard cap on the outer popup -- prevents the whole body from scrolling
     when the inner list + footer + attribution row would otherwise push past
     Chromium's popup viewport. Only the list area scrolls. */
  html, body { max-height:600px; overflow-y:hidden; }
  /* Belt-and-braces: every element confined to its parent's width.
     Prevents long unbreakable tokens (scope GUIDs, role names) from making
     rows wider than the popup and triggering horizontal scrollbar. */
  *, *::before, *::after { box-sizing:border-box; max-width:100%; }
  /* Blue frame around the whole popup so it's visually distinct against
     the page behind it (Chromium popups blend into white pages). */
  body { border:2px solid #0969da; }
  /* Role preview lines (v2.4.28+) can contain long scope strings (GUIDs,
     /subscriptions/<id>/resourceGroups/<name>). Break inside long tokens
     rather than pushing the row out. */
  .row .body > div, .ma-row .ma-roles > div { overflow-wrap:anywhere; word-break:break-word; min-width:0; }
  /* Lock textarea so the user-drag resize handle doesn't extend past width. */
  textarea { resize:vertical; }
  /* Header is the brand banner: blue background, white text, all-caps
     title. Stands out as the popup's identity bar against the white body. */
  header { padding:10px 12px; border-bottom:1px solid #0969da; display:flex; align-items:center; gap:10px; background:#0969da; color:#ffffff; }
  header h1 { font-size:17px; margin:0; flex:1; color:#ffffff; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
  header h1 #version-badge { color:rgba(255,255,255,0.7); }
  #me { color:#ffffff; font-size:11px; opacity:0.9; }
  header button { background:rgba(255,255,255,0.15); color:#ffffff; border:1px solid rgba(255,255,255,0.4); border-radius:4px; padding:3px 10px; font-size:11.5px; cursor:pointer; }
  header button:hover { background:rgba(255,255,255,0.25); }
  button { background:#f6f8fa; color:#1a1a1a; border:1px solid #d0d7de; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:12px; }
  button.primary { background:#0969da; border-color:#0969da; color:#fff; }
  button.primary:hover { background:#0860c7; }
  button:hover { background:#eaeef2; }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  .row { padding:8px 12px; border-bottom:1px solid #eaeef2; display:flex; align-items:flex-start; gap:8px; }
  .row:hover { background:#f6f8fa; }
  .row .name { font-weight:600; color:#0969da; font-size:13px; }
  .row input[type=checkbox] { margin-top:2px; }
  .row .body { flex:1; min-width:0; }
  .row .name { font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .meta { font-size:10.5px; color:#57606a; margin-top:2px; }
  .row .status { font-size:10.5px; margin-top:2px; }
  .status.ok { color:#1a7f37; }
  .status.err { color:#cf222e; }
  .status.pending { color:#9a6700; }
  footer { position:sticky; bottom:0; background:#f6f8fa; border-top:1px solid #d0d7de; padding:8px 12px; }
  .controls { display:grid; grid-template-columns:auto 1fr; gap:6px 10px; align-items:center; margin-bottom:8px; }
  .controls label { font-size:11px; color:#57606a; }
  .controls input, .controls textarea { width:100%; box-sizing:border-box; background:#ffffff; color:#1a1a1a; border:1px solid #d0d7de; border-radius:5px; padding:5px 7px; font-size:12px; font-family:inherit; }
  .controls textarea { resize:vertical; min-height:30px; }
  .actions { display:flex; gap:8px; }
  .actions .count { flex:1; align-self:center; font-size:11px; color:#57606a; }
  #toolbar { display:flex; gap:6px; padding:6px 12px; border-bottom:1px solid #eaeef2; background:#ffffff; }
  #toolbar input[type=search] { flex:1; background:#ffffff; color:#1a1a1a; border:1px solid #d0d7de; border-radius:5px; padding:4px 8px; font-size:12px; }
  #toolbar a { color:#57606a; font-size:11px; align-self:center; cursor:pointer; text-decoration:none; }
  #toolbar a:hover { color:#0969da; }
  #status-bar { padding:8px 12px; color:#57606a; font-size:11px; }
  #status-bar.err { color:#cf222e; font-weight:500; }
  .empty { padding:20px 12px; color:#57606a; text-align:center; font-style:italic; font-size:12px; }
  /* (single max-height rule for #list lives above with #myaccess-list) */

  /* Tab strip */
  #tabs { display:flex; gap:4px; padding:0 12px; border-bottom:1px solid #d0d7de; background:#f6f8fa; }
  .tab-btn { background:transparent; border:none; border-bottom:2px solid transparent; color:#57606a; padding:8px 12px; font-size:12.5px; cursor:pointer; border-radius:0; display:inline-flex; align-items:center; gap:6px; }
  .tab-btn:hover { background:transparent; color:#0969da; }
  .tab-btn.active { color:#0969da; font-weight:600; border-bottom-color:#0969da; }
  .tab-btn .badge { background:#eaeef2; color:#57606a; border:1px solid #d0d7de; border-radius:10px; padding:0 6px; font-size:10.5px; min-width:14px; text-align:center; }
  .tab-btn.active .badge { background:#0969da; color:#fff; border-color:#0969da; }
  [role=tabpanel][hidden] { display:none; }

  /* Reusable progress bar -- used on Activate (sign-in load + bulk role fetch)
     and My Access (role assignment fetch). Taller than the old 5px stripe so
     users actually notice it; min-height ensures it occupies vertical space
     immediately. */
  .progress-bar { padding:8px 12px; background:#f6f8fa; border-bottom:1px solid #d0d7de; }
  .progress-bar .progress-row { display:flex; justify-content:space-between; font-size:11.5px; color:#0969da; font-weight:600; }
  .progress-bar .progress-track { background:#d0d7de; height:8px; border-radius:4px; overflow:hidden; margin-top:5px; }
  .progress-bar .progress-fill { background:#0969da; height:100%; width:0%; transition:width 0.25s ease-out; border-radius:4px; }
  /* Indeterminate mode -- used when total is unknown (initial page load,
     paginated Graph fetches). Animated stripe scrolls across the track. */
  .progress-bar .progress-fill.indeterminate {
    width:100% !important;
    background-image: linear-gradient(90deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.55) 50%,
      rgba(255,255,255,0) 100%),
      #0969da;
    background-size: 50% 100%, 100% 100%;
    background-repeat: no-repeat;
    animation: indeterminate-slide 1.2s linear infinite;
  }
  @keyframes indeterminate-slide {
    0%   { background-position: -50% 0, 0 0; }
    100% { background-position: 150% 0, 0 0; }
  }

  /* My Access tab */
  #myaccess-toolbar { display:flex; gap:6px; padding:6px 12px; border-bottom:1px solid #eaeef2; align-items:center; background:#ffffff; }
  #myaccess-toolbar .spacer { flex:1; }
  #myaccess-status { padding:8px 12px; color:#57606a; font-size:11px; }
  #myaccess-status.err { color:#cf222e; }
  #myaccess-list { max-height:520px; overflow:auto; }
  .ma-section { padding:8px 12px 4px 12px; color:#57606a; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #eaeef2; background:#f6f8fa; }
  .ma-row { padding:8px 12px; border-bottom:1px solid #eaeef2; }
  .ma-row .ma-head { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .ma-row .ma-name { font-size:12.5px; font-weight:600; color:#0969da; flex:1; min-width:0; word-break:break-word; }
  .ma-row .ma-times { font-size:10.5px; color:#57606a; white-space:nowrap; }
  .ma-row .ma-roles { margin-top:4px; padding-left:16px; }
  .ma-row .ma-role { font-size:11.5px; color:#1a1a1a; padding:2px 0; }
  .ma-row .ma-role .ma-scope { color:#57606a; }
  .ma-row .ma-role.ma-rbac { color:#57606a; font-style:italic; }
  .ma-row .ma-role.ma-err { color:#cf222e; font-style:italic; }
  .ma-row .ma-role.ma-loading { color:#9a6700; font-style:italic; }
</style>
</head>
<body>

<header>
  <h1>PIM Activator <span id="version-badge" style="font-weight:400;font-size:11px;color:#b1bac4;margin-left:6px;"></span></h1>
  <div id="me"></div>
  <button id="sign-in" style="display:none">Sign in</button>
  <button id="sign-out" style="display:none">Sign out</button>
</header>

<div id="tabs" style="display:none">
  <button class="tab-btn active" data-tab="activate" id="tab-btn-activate">Activate <span class="badge" id="badge-activate">0</span></button>
  <button class="tab-btn" data-tab="myaccess" id="tab-btn-myaccess">My Access <span class="badge" id="badge-myaccess">0</span></button>
</div>

<!-- =============== Activate tab =============== -->
<div role="tabpanel" id="panel-activate">
  <div id="toolbar" style="display:none">
    <input id="search" type="search" placeholder="Filter groups...">
    <a id="select-all">all</a>
    <a id="select-none">none</a>
    <a id="refresh">refresh</a>
  </div>

  <div id="status-bar">Loading...</div>

  <!-- Boot-phase progress (indeterminate -- no totals during paginated
       eligibility + name hydration). Visible from sign-in completion until
       the group list renders. Then bulk-fetch bar in the footer takes over. -->
  <div id="activate-boot-progress" class="progress-bar" style="display:none;">
    <div class="progress-row">
      <span id="activate-boot-progress-label">Loading your PIM delegations...</span>
      <span></span>
    </div>
    <div class="progress-track">
      <div id="activate-boot-progress-bar" class="progress-fill indeterminate"></div>
    </div>
  </div>

  <div id="list"></div>

  <footer style="display:none" id="footer">
    <!-- Background role-fetch progress: group list renders instantly, then
         this bar appears in the footer while roles + AU names stream in.
         User explicitly asked for it here (not above the list) so the
         pulldown content stays stable while progress updates. -->
    <div id="bulk-progress" class="progress-bar" style="display:none;margin:-8px -12px 8px -12px;border-top:1px solid #d0d7de;">
      <div class="progress-row">
        <span id="bulk-progress-label">Fetching role assignments... 0%</span>
        <span id="bulk-progress-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div id="bulk-progress-bar" class="progress-fill"></div>
      </div>
    </div>
    <div class="controls">
      <label for="justification">Justification</label>
      <input id="justification" type="text" list="justification-history" autocomplete="off" placeholder="e.g. Daily ops">
      <datalist id="justification-history"></datalist>
      <label for="duration">Duration (hours)</label>
      <input id="duration" type="number" min="0.5" max="24" step="0.5">
    </div>
    <div class="actions">
      <div class="count" id="count"></div>
      <button class="primary" id="activate" disabled>Activate selected</button>
    </div>
  </footer>
</div>

<!-- =============== My Access tab =============== -->
<div role="tabpanel" id="panel-myaccess" hidden>
  <div id="myaccess-toolbar">
    <button id="myaccess-autofix" title="Sign out and back in to refresh your Microsoft sign-in. Use this if the popup looks broken, if an admin just granted you new permissions, or if you switched between Edge and Chrome.">Re-sign in</button>
    <button id="myaccess-select-all"  title="Tick every active membership for bulk deactivate." style="font-size:11px;">all</button>
    <button id="myaccess-select-none" title="Untick every active membership." style="font-size:11px;">none</button>
    <button id="myaccess-deactivate-selected" disabled title="Deactivate every ticked membership. Confirm prompt before it runs."
      style="background:#ffffff;color:#cf222e;border:1px solid #cf222e;border-radius:4px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;">Deactivate selected (0)</button>
    <div id="myaccess-scope-status" style="font-size:11px;color:#7d8590;padding:0 4px;"></div>
    <div class="spacer"></div>
    <button id="myaccess-refresh">Refresh</button>
  </div>
  <div id="myaccess-status">Loading...</div>

  <!-- My Access role-fetch progress: rows render instantly with names, then
       this bar shows while Entra + Azure RBAC roles stream in per group. -->
  <div id="myaccess-progress" class="progress-bar" style="display:none;">
    <div class="progress-row">
      <span id="myaccess-progress-label">Fetching role assignments... 0%</span>
      <span id="myaccess-progress-count">0 / 0</span>
    </div>
    <div class="progress-track">
      <div id="myaccess-progress-bar" class="progress-fill"></div>
    </div>
  </div>

  <div id="myaccess-list"></div>
</div>

<footer id="popup-footer" style="padding:8px 12px;font-size:10.5px;color:#7d8590;border-top:1px solid #d0d7de;background:#f6f8fa;display:flex;align-items:center;gap:10px;">
  <div style="flex:1;">
    Developed by <a href="https://aka.ms/morten" target="_blank" rel="noopener" style="color:#0969da;text-decoration:none;font-weight:600;">Morten Knudsen</a>
    &middot; part of
    <a href="https://github.com/KnudsenMorten/PIM4EntraPS" target="_blank" rel="noopener" style="color:#0969da;text-decoration:none;">PIM4EntraPS</a>
  </div>
  <div id="footer-tenant" title="" style="font-family:monospace;font-size:10px;color:#57606a;"></div>
</footer>

<script src="config.js"></script>
<script type="module" src="popup.js"></script>
</body>
</html>
